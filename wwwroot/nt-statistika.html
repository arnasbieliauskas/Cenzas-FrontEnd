<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizės Įrankis | Cenzas Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="dashboard-grid">
            <!-- Sidebar Filters -->
            <aside class="filters-panel">
                <h3 class="filters-title">Filtrai</h3>

                <!-- Group 1: Location -->
                <div class="filter-section">
                    <div class="filter-group">
                        <label class="filter-label">Miestas</label>
                        <div class="select-field">
                            <select id="filter-city" class="form-input">
                                <option value="">Pasirinkite miestą</option>
                            </select>
                            <i class="chevron-icon"></i>
                        </div>
                    </div>
                    <div class="filter-group" id="district-group">
                        <label class="filter-label">Rajonai</label>
                        <button type="button" class="btn-select-field" id="btn-select-districts">
                            <div class="chip-container" id="districts-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                    <div class="filter-group" id="street-group">
                        <label class="filter-label">Gatvės</label>
                        <button type="button" class="btn-select-field" id="btn-select-streets">
                            <div class="chip-container" id="streets-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Group 2: Property -->
                <div class="filter-section">
                    <div class="filter-group">
                        <label class="filter-label">Objekto Tipas</label>
                        <button type="button" class="btn-select-field" id="btn-select-objects">
                            <div class="chip-container" id="objects-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Kambarių skaičius</label>
                        <button type="button" class="btn-select-field" id="btn-select-rooms">
                            <div class="chip-container" id="rooms-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Group 3: Metrics (Grid Layout) -->
                <div class="filter-section">
                    <div class="filter-row-grid">
                        <div class="filter-group">
                            <label class="filter-label">Kaina (€) Nuo</label>
                            <input type="number" id="price-min" class="form-input" placeholder="0">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Iki</label>
                            <input type="number" id="price-max" class="form-input" placeholder="∞">
                        </div>
                    </div>

                    <div class="filter-row-grid">
                        <div class="filter-group">
                            <label class="filter-label">Plotas (m²) Nuo</label>
                            <input type="number" id="area-min" class="form-input" placeholder="0">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Iki</label>
                            <input type="number" id="area-max" class="form-input" placeholder="∞">
                        </div>
                    </div>

                    <div class="filter-row-grid">
                        <div class="filter-group">
                            <label class="filter-label">Metai Nuo</label>
                            <input type="number" id="year-min" class="form-input" placeholder="Nuo">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Iki</label>
                            <input type="number" id="year-max" class="form-input" placeholder="Iki">
                        </div>
                    </div>
                </div>

                <!-- Group 4: Technical -->
                <div class="filter-section">
                    <div class="filter-group">
                        <label class="filter-label">Šildymas</label>
                        <button type="button" class="btn-select-field" id="btn-select-heating">
                            <div class="chip-container" id="heating-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Įrengimas</label>
                        <button type="button" class="btn-select-field" id="btn-select-equipped">
                            <div class="chip-container" id="equipped-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Energinė Klasė</label>
                        <button type="button" class="btn-select-field" id="btn-select-energy">
                            <div class="chip-container" id="energy-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Group 5: Timeframe -->
                <div class="filter-section">
                    <div class="filter-group">
                        <label class="filter-label">Data Nuo</label>
                        <input type="date" id="date-from" class="form-input">
                    </div>
                    <div class="filter-group" style="margin-top: 12px;">
                        <label class="filter-label">Iki</label>
                        <input type="date" id="date-to" class="form-input">
                    </div>
                </div>


            </aside>

            <!-- Main Content Area -->
            <section>
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-card__label">Vidutinė kaina</div>
                        <div class="stat-card__value" id="avg-price">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__label">Vid. kaina / m²</div>
                        <div class="stat-card__value" id="avg-price-sqm">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__label">Rinkos Stabilumas</div>
                        <div class="stat-card__value" id="stability-score">—</div>
                    </div>
                </div>

                <div id="chart-container" class="stat-card"
                    style="margin-bottom: 40px; height: 400px; display: flex; align-items: center; justify-content: center; position: relative;">
                    <canvas id="marketTrendChart"></canvas>
                </div>

                <div id="listings-wrapper">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h2 style="font-size: 20px;">Skelbimų Sąrašas (<span id="total-count">0</span>)</h2>
                        <div class="price-filter-tabs">
                            <button class="filter-tab active" data-type="all">Visi</button>
                            <button class="filter-tab" data-type="down">Tik atpigę</button>
                            <button class="filter-tab" data-type="up">Tik pabrangę</button>
                        </div>
                    </div>
                    <div id="listings-container" class="listings-grid"></div>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Modals -->
    <div id="districts-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Rajonai</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="districts-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-districts">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="district-options" class="modal-options"></div>
            </div>
            <button id="confirm-districts" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="streets-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Gatvės</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="streets-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-streets">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="street-options" class="modal-options"></div>
            </div>
            <button id="confirm-streets" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="rooms-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Kambarių skaičius</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="rooms-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-rooms">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="rooms-options" class="modal-options"></div>
            </div>
            <button id="confirm-rooms" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="objects-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Objekto Tipas</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="objects-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-objects">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="objects-options" class="modal-options"></div>
            </div>
            <button id="confirm-objects" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="heating-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Šildymas</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="heating-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-heating">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="heating-options" class="modal-options"></div>
            </div>
            <button id="confirm-heating" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="equipped-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Įrengimas</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="equipped-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-equipped">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="equipped-options" class="modal-options"></div>
            </div>
            <button id="confirm-equipped" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="energy-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Energetinė Klasė</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="energy-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-energy">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="energy-options" class="modal-options"></div>
            </div>
            <button id="confirm-energy" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <script src="js/main.js" defer></script>
    <script src="js/nt-duomenu-valymas.js" defer></script>
    <script src="js/nt-statistika.js" defer></script>
</body>

</html>
