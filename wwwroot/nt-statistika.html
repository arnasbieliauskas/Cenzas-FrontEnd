<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizės Įrankis | Cenzas Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="dashboard-grid">
            <!-- Sidebar Filters -->
            <aside class="filters-panel">
                <h3 class="filters-title">Filtrai</h3>

                <!-- Group 1: Location -->
                <div class="filter-section">
                    <div class="filter-group">
                        <label class="filter-label">Miestas</label>
                        <div class="select-field">
                            <select id="filter-city" class="form-input">
                                <option value="">Pasirinkite miestą</option>
                            </select>
                            <i class="chevron-icon"></i>
                        </div>
                    </div>
                    <div class="filter-group" id="district-group">
                        <label class="filter-label">Rajonai</label>
                        <button type="button" class="btn-select-field" id="btn-select-districts">
                            <div class="chip-container" id="districts-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                    <div class="filter-group" id="street-group">
                        <label class="filter-label">Gatvės</label>
                        <button type="button" class="btn-select-field" id="btn-select-streets">
                            <div class="chip-container" id="streets-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Group 2: Property -->
                <div class="filter-section">
                    <div class="filter-group">
                        <label class="filter-label">Objekto Tipas</label>
                        <button type="button" class="btn-select-field" id="btn-select-objects">
                            <div class="chip-container" id="objects-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Kambarių skaičius</label>
                        <button type="button" class="btn-select-field" id="btn-select-rooms">
                            <div class="chip-container" id="rooms-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Group 3: Metrics (Grid Layout) -->
                <div class="filter-section">
                    <div class="filter-row-grid">
                        <div class="filter-group">
                            <label class="filter-label">Kaina (€) Nuo</label>
                            <input type="text" id="price-min" class="form-input" placeholder="0" inputmode="numeric" pattern="[0-9]*">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Iki</label>
                            <input type="text" id="price-max" class="form-input" placeholder="∞" inputmode="numeric" pattern="[0-9]*">
                        </div>
                    </div>

                    <div class="filter-row-grid">
                        <div class="filter-group">
                            <label class="filter-label">Plotas (m²) Nuo</label>
                            <input type="text" id="area-min" class="form-input" placeholder="0" inputmode="numeric" pattern="[0-9]*">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Iki</label>
                            <input type="text" id="area-max" class="form-input" placeholder="∞" inputmode="numeric" pattern="[0-9]*">
                        </div>
                    </div>

                    <div class="filter-row-grid">
                        <div class="filter-group">
                            <label class="filter-label">Statybos Metai Nuo</label>
                            <input type="text" id="year-min" class="form-input" placeholder="Nuo" inputmode="numeric" pattern="[0-9]*">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Iki</label>
                            <input type="text" id="year-max" class="form-input" placeholder="Iki" inputmode="numeric" pattern="[0-9]*">
                        </div>
                    </div>
                </div>

                <!-- Group 4: Technical -->
                <div class="filter-section">
                    <div class="filter-group">
                        <label class="filter-label">Šildymas</label>
                        <button type="button" class="btn-select-field" id="btn-select-heating">
                            <div class="chip-container" id="heating-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Įrengimas</label>
                        <button type="button" class="btn-select-field" id="btn-select-equipped">
                            <div class="chip-container" id="equipped-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Energinė Klasė</label>
                        <button type="button" class="btn-select-field" id="btn-select-energy">
                            <div class="chip-container" id="energy-chips">Pasirinkti</div>
                            <i class="chevron-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Group 5: Timeframe -->
                <div class="filter-section">
                    <div class="filter-group">
                        <label class="filter-label">Data Nuo</label>
                        <input type="date" id="date-from" class="form-input">
                    </div>
                    <div class="filter-group" style="margin-top: 12px;">
                        <label class="filter-label">Iki</label>
                        <input type="date" id="date-to" class="form-input">
                    </div>
                </div>


            </aside>

            <!-- Main Content Area -->
            <section>
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-card__label">Vidutinė kaina</div>
                        <div class="stat-card__value" id="avg-price">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__label">Vid. kaina / m²</div>
                        <div class="stat-card__value" id="avg-price-sqm">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__label">Rinkos Stabilumas</div>
                        <div class="stat-card__value" id="stability-score">—</div>
                    </div>
                </div>

                <div id="chart-container" class="stat-card" style="margin-bottom: 40px; min-height: 450px; padding: 30px; display: flex; flex-direction: column; position: relative;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h3 style="margin: 0; font-size: 18px; font-weight: 700; color: var(--color-black);">Rinkos Tendencijos</h3>
                        <div style="font-size: 12px; color: var(--color-text-light); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Kaina vs. Kiekis</div>
                    </div>

                    <!-- Rule: Chart Visualization Controls -->
                    <div class="chart-controls-wrapper">
                        <div class="chart-type-selector">
                            <button class="chart-type-btn active" data-type="line" title="Linijinis">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                                Linijinis
                            </button>
                            <button class="chart-type-btn" data-type="bar" title="Stulpinis">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7"/><rect x="12" y="5" width="3" height="12"/><rect x="17" y="13" width="3" height="4"/></svg>
                                Stulpinis
                            </button>
                            <button class="chart-type-btn" data-type="area" title="Ploto">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M21 9l-7 8-4-4-7 7V9l7-7 4 4 7-7v9z" fill="currentColor" fill-opacity="0.2"/></svg>
                                Ploto
                            </button>
                            <button class="chart-type-btn" data-type="stepped" title="Laiptuotas">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 17h4v-4h4v-4h4"/></svg>
                                Laiptuotas
                            </button>
                            <button class="chart-type-btn" data-type="scatter" title="Taškinis">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><circle cx="8" cy="14" r="1" fill="currentColor"/><circle cx="12" cy="10" r="1" fill="currentColor"/><circle cx="16" cy="15" r="1" fill="currentColor"/><circle cx="19" cy="8" r="1" fill="currentColor"/></svg>
                                Taškinis
                            </button>
                            <button class="chart-type-btn" data-type="bar-stacked" title="Sluoksniuotas Stulpinis">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="14" width="4" height="3" fill="currentColor" fill-opacity="0.4"/><rect x="7" y="10" width="4" height="4"/><rect x="14" y="12" width="4" height="5" fill="currentColor" fill-opacity="0.4"/><rect x="14" y="7" width="4" height="5"/></svg>
                                Sluoks. Stulp.
                            </button>
                            <button class="chart-type-btn" data-type="area-stacked" title="Sluoksniuotas Plotas">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M21 9l-7 8-4-4-7 7v-4l7-7 4 4 7-7z" fill="currentColor" fill-opacity="0.4"/><path d="M21 5l-7 8-4-4-7 7v-4l7-7 4 4 7-7z"/></svg>
                                Sluoks. Plotas
                            </button>
                        </div>
                    </div>
                    <div class="chart-wrapper" id="chart-wrapper">
                        <canvas id="marketTrendChart"></canvas>
                        <div class="chart-loading-overlay" id="chart-loader">
                            <div class="loader-progress-bar"></div>
                        </div>
                    </div>
                </div>

                <div id="listings-wrapper">
                        <div
                            style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; gap: 20px;">
                            <h2 style="font-size: 20px; margin: 0; white-space: nowrap;">Skelbimų Sąrašas (<span id="total-count">0</span>)</h2>
                            <div class="quick-filters">
                                <!-- Group 1: Price Change -->
                                <div class="quick-filter-group">
                                    <span class="quick-filter-group__label">Kainos pokytis:</span>
                                    <div class="filter-tabs" data-group="price">
                                        <button class="filter-tab active" data-type="all">Visi</button>
                                        <button class="filter-tab" data-type="down">Tik atpigę</button>
                                        <button class="filter-tab" data-type="up">Tik pabrangę</button>
                                    </div>
                                </div>
                                <!-- Group 2: Expiration Status -->
                                <div class="quick-filter-group">
                                    <span class="quick-filter-group__label">Skelbimo būsena:</span>
                                    <div class="filter-tabs" data-group="status">
                                        <button class="filter-tab active" data-type="all">Visi</button>
                                        <button class="filter-tab" data-type="valid">Galiojantys</button>
                                        <button class="filter-tab" data-type="expired">Tikėtina, kad negaliojantys</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    <div id="listings-container" class="listings-grid"></div>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Modals -->
    <div id="districts-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Rajonai</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="districts-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-districts">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="district-options" class="modal-options"></div>
            </div>
            <button id="confirm-districts" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="streets-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Gatvės</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="streets-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-streets">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="street-options" class="modal-options"></div>
            </div>
            <button id="confirm-streets" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="rooms-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Kambarių skaičius</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="rooms-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-rooms">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="rooms-options" class="modal-options"></div>
            </div>
            <button id="confirm-rooms" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="objects-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Objekto Tipas</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="objects-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-objects">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="objects-options" class="modal-options"></div>
            </div>
            <button id="confirm-objects" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="heating-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Šildymas</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="heating-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-heating">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="heating-options" class="modal-options"></div>
            </div>
            <button id="confirm-heating" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="equipped-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Įrengimas</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="equipped-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-equipped">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="equipped-options" class="modal-options"></div>
            </div>
            <button id="confirm-equipped" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <div id="energy-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Energetinė Klasė</h3><button class="close-modal">&times;</button>
            </div>
            <div class="modal-chip-header">
                <div id="energy-modal-chips" class="modal-chip-area"></div>
                <button type="button" class="btn--text" id="clear-energy">Išvalyti pasirinkimus</button>
            </div>
            <div class="modal-body">
                <div id="energy-options" class="modal-options"></div>
            </div>
            <button id="confirm-energy" class="btn btn--primary"
                style="margin-top: 20px; width: 100%;">IŠSAUGOTI</button>
        </div>
    </div>

    <script src="js/main.js" defer></script>
    <script src="js/nt-duomenu-valymas.js" defer></script>
    <script src="js/nt-statistika.js?v=1.1"></script>
</body>

</html>
